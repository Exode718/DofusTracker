<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tracker de Dofus - Overlay OBS</title>
    <link rel="icon" type="image/x-icon" href="img/favicon.ico">
    <style>
        body {
            background-color: transparent;
            margin: 0;
            padding: 2vh;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            box-sizing: border-box;
            overflow: hidden;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            grid-template-rows: repeat(5, 1fr);
            gap: 1vh;
            padding: 2vh;
            background: transparent;
            width: auto;
            height: 90vh;
            max-width: 95vw;
            aspect-ratio: 1 / 1; /* Grille parfaitement carrée pour du 5x5 */
            box-sizing: border-box;
        }

        .dofus-container {
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: visible;
        }

        .dofus {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 12px;
            box-sizing: border-box;
            filter: grayscale(100%) brightness(25%);
            cursor: pointer;
            transition: filter 0.3s, transform 0.2s;
        }

        .dofus:hover {
            transform: scale(1.08);
        }

        .dofus.active {
            filter: grayscale(0%) brightness(100%) drop-shadow(0 0 15px rgba(255, 215, 0, 0.75));
        }
    </style>
</head>
<body>

    <div class="grid">
        <div class="dofus-container"><img src="img/dofawa.png" id="dofawa" class="dofus" alt="Dofawa"></div>
        <div class="dofus-container"><img src="img/argente.png" id="argente" class="dofus" alt="Argenté"></div>
        <div class="dofus-container"><img src="img/cawotte.png" id="cawotte" class="dofus" alt="Cawotte"></div>
        <div class="dofus-container"><img src="img/dokoko.png" id="dokoko" class="dofus" alt="Dokoko"></div>
        <div class="dofus-container"><img src="img/veilleurs.png" id="veilleurs" class="dofus" alt="Veilleurs"></div>
        
        <div class="dofus-container"><img src="img/emeraude.png" id="emeraude" class="dofus" alt="Émeraude"></div>
        <div class="dofus-container"><img src="img/kaliptus.png" id="kaliptus" class="dofus" alt="Kaliptus"></div>
        <div class="dofus-container"><img src="img/pourpre.png" id="pourpre" class="dofus" alt="Pourpre"></div>
        <div class="dofus-container"><img src="img/domakuro.png" id="domakuro" class="dofus" alt="Domakuro"></div>
        <div class="dofus-container"><img src="img/dorigami.png" id="dorigami" class="dofus" alt="Dorigami"></div>
        
        <div class="dofus-container"><img src="img/turquoise.png" id="turquoise" class="dofus" alt="Turquoise"></div>
        <div class="dofus-container"><img src="img/ocre.png" id="ocre" class="dofus" alt="Ocre"></div>
        <div class="dofus-container"><img src="img/dofoozbz.png" id="dofoozbz" class="dofus" alt="Dofoozbz"></div>
        <div class="dofus-container"><img src="img/glaces.png" id="glaces" class="dofus" alt="Glaces"></div>
        <div class="dofus-container"><img src="img/nebuleux.png" id="nebuleux" class="dofus" alt="Nébuleux"></div>
        
        <div class="dofus-container"><img src="img/abyssal.png" id="abyssal" class="dofus" alt="Abyssal"></div>
        <div class="dofus-container"><img src="img/ivoire.png" id="ivoire" class="dofus" alt="Ivoire"></div>
        <div class="dofus-container"><img src="img/ebene.png" id="ebene" class="dofus" alt="Ébène"></div>
        <div class="dofus-container"><img src="img/argente-scintillant.png" id="argente-scintillant" class="dofus" alt="Argenté Scintillant"></div>
        <div class="dofus-container"><img src="img/vulbis.png" id="vulbis" class="dofus" alt="Vulbis"></div>
        
        <div class="dofus-container"><img src="img/forgelave.png" id="forgelave" class="dofus" alt="Forgelave"></div>
        <div class="dofus-container"><img src="img/tachete.png" id="tachete" class="dofus" alt="Tacheté"></div>
        <div class="dofus-container"><img src="img/cauchemar.png" id="cauchemar" class="dofus" alt="Cauchemar"></div>
        <div class="dofus-container"><img src="img/sylvestre.png" id="sylvestre" class="dofus" alt="Sylvestre"></div>
        <div class="dofus-container"><img src="img/twiksface.png" id="twiksface" class="dofus" alt="Twiksface"></div>
    </div>

    <script>
        const storageKey = 'tracker_dofus_progression';

        function loadProgression() {
            const saved = localStorage.getItem(storageKey);
            if (saved) {
                const activeIds = JSON.parse(saved);
                activeIds.forEach(id => {
                    const el = document.getElementById(id);
                    if (el) el.classList.add('active');
                });
            }
        }

        function saveProgression() {
            const activeDofus = document.querySelectorAll('.dofus.active');
            const activeIds = Array.from(activeDofus).map(el => el.id);
            localStorage.setItem(storageKey, JSON.stringify(activeIds));
        }

        document.querySelectorAll('.dofus').forEach(dofus => {
            dofus.addEventListener('click', () => {
                dofus.classList.toggle('active');
                saveProgression();
            });
        });

        loadProgression();
    </script>

</body>
</html>
